version: "3"

services:
  postgres:
      image: postgres:13.3
      container_name: calendar-postgres
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: 123456
        POSTGRES_DB: template2
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ../migrations:/docker-entrypoint-initdb.d
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 10s
        timeout: 5s
        retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: calendar-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-vz", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: calendar-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  calendar-api:
    build:
      context: ../
      dockerfile: deployments/Dockerfile.calendar
    container_name: calendar-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8888:8888"
    environment:
      - CONFIG_PATH=/etc/calendar/config.yaml
    volumes:
      - ../configs/calendar_config.yaml:/etc/calendar/config.yaml
      - ../logs:/logs
    restart: unless-stopped

  calendar-scheduler:
    build:
      context: ../
      dockerfile: deployments/Dockerfile.scheduler
    container_name: calendar-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - CONFIG_PATH=/etc/calendar/config.yaml
    volumes:
      - ../configs/scheduler_config.yaml:/etc/calendar/config.yaml
      - ../logs:/logs
    restart: unless-stopped

  calendar-storer:
    build:
      context: ../
      dockerfile: deployments/Dockerfile.storer
    container_name: calendar-storer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - CONFIG_PATH=/etc/calendar/config.yaml
    volumes:
      - ../configs/storer_config.yaml:/etc/calendar/config.yaml
      - ../logs:/logs
    restart: unless-stopped

volumes:
  postgres_data: