storage:
  mode: "postgres"
  dsn: "postgres://test:test@postgres:5432/testdb?sslmode=disable"

kafka:
  brokers:
    - "kafka:9092"
  group-id: "test-group"
  timeout: 10s
  write_timeout: 10s
  read_timeout: 10s
  max_attempts: 5
  topics:
    topic_notifications: "notifications"

server:
  host: "0.0.0.0"
  port: 8888
  timeout: 30s