version: '3.8'

name: calendar-integration-test

services:
  postgres:
    image: postgres:13.3
    container_name: test-postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network
    volumes:
      - ../migrations:/docker-entrypoint-initdb.d

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: test-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "nc", "-vz", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: test-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - test-network

  calendar-api:
    build:
      context: ../
      dockerfile: deployments/Dockerfile.calendar
    container_name: test-calendar-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - CONFIG_PATH=/etc/calendar/config.yaml
    ports:
      - "8888:8888"
    volumes:
      - ../configs/test/calendar_config.test.yaml:/etc/calendar/config.yaml
      - ../logs:/logs
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8888/"]
      interval: 10s
      timeout: 5s
      retries: 5

  calendar-scheduler:
    build:
      context: ../
      dockerfile: deployments/Dockerfile.scheduler
    container_name: test-calendar-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - CONFIG_PATH=/etc/calendar/config.yaml
    volumes:
      - ../configs/test/scheduler_config.test.yaml:/etc/calendar/config.yaml
      - ../logs:/logs
    networks:
      - test-network

  calendar-storer:
    build:
      context: ../
      dockerfile: deployments/Dockerfile.storer
    container_name: test-calendar-storer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - CONFIG_PATH=/etc/calendar/config.yaml
    volumes:
      - ../configs/test/storer_config.test.yaml:/etc/calendar/config.yaml
      - ../logs:/logs
    networks:
      - test-network

  integration-tests:
    build:
      context: ../
      dockerfile: test/Dockerfile.tests
    container_name: test-runner
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      calendar-api:
        condition: service_healthy
      calendar-scheduler:
        condition: service_started
      calendar-storer:
        condition: service_started
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=testdb
      - KAFKA_BROKERS=kafka:9092
      - API_HOST=calendar-api
      - API_PORT=8888
      - TEST_MODE=docker
    networks:
      - test-network
    command: >
      sh -c "/test/wait-for-it.sh postgres:5432 -t 60 &&
           /test/wait-for-it.sh kafka:9092 -t 60 &&
           /test/wait-for-it.sh calendar-api:8888 -t 60 &&
           /integration.test -test.v"

networks:
  test-network:
    driver: bridge